<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Bereket Abera Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="contact-page-body">

    <!-- NAVIGATION BAR (Reused from your index page for consistency) -->
    <nav class="studio-navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">Bereket<span>®</span></a>
            <a href="index.html" class="back-home-link">← Back to Home</a>
        </div>
    </nav>

    <!-- MAIN CONTACT CONTENT AREA -->
    <main class="contact-main-layout">
        <div class="contact-grid-wrapper">
            
            <!-- LEFT AREA: EDITORIAL TITLES -->
            <div class="contact-info-block">
                <div class="about-tagline-row">
                    <span class="dot-badge"></span>
                    <span class="tagline-text">Get in touch</span>
                </div>
                <h1 class="contact-display-headline">Let’s build something meaningful together.</h1>
                <p class="contact-sub-text">
                    Have an idea, a project, or a platform architecture you want to bring to life? Drop a line, and let's construct it with surgical precision.
                </p>
                
                 
            </div>

            <!-- RIGHT AREA: SECURE INBOX-ROUTED CONTACT FORM -->
            <div class="contact-form-block">
                <!-- Change the action URL after completing Step 3 below -->
                <form action="https://formspree.io/f/xpqepakk" method="POST" class="portfolio-contact-form">
                    
                    <div class="form-input-group">
                        <label for="user-name">Your Name *</label>
                        <input type="text" id="user-name" name="name" placeholder="What should I call you?" required>
                    </div>

                    <div class="form-input-group">
                        <label for="user-email">Email Address *</label>
                        <input type="email" id="user-email" name="_replyto" placeholder="where can I write back to you?" required>
                    </div>

                    <div class="form-input-group">
                        <label for="user-msg">Your Message *</label>
                        <textarea id="user-msg" name="message" rows="6" placeholder="Tell me about your project objectives..." required></textarea>
                    </div>

                    <!-- Anti-spam honeypot hidden field (Stops bots from spamming your Gmail) -->
                    <input type="text" name="_gotcha" style="display:none">

                    <button type="submit" class="form-submit-capsule-btn">
                        Send Message 
                        <span class="submit-btn-arrow">→</span>
                    </button>

                </form>
            </div>

        </div>
    </main>

</body>
</html>
